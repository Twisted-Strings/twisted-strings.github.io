<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% seo %}
  </head>

  <body>

    <header>
      <div class="container">
        <a id="a-title" href="{{ '/' | relative_url }}">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>

        <section id="downloads">
          {% if site.show_downloads %}
            <a href="{{ site.github.zip_url }}" class="btn">Download ZIP</a>
            <a href="{{ site.github.tar_url }}" class="btn">Download TAR</a>
          {% endif %}
          <a href="{{ site.github.repository_url }}" class="btn btn-github"><span class="icon"></span>View on GitHub</a>
        </section>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script>
      if (typeof window.mermaid !== 'undefined' && window.mermaid) {
        window.mermaid.initialize({ startOnLoad: false });
        document.addEventListener("DOMContentLoaded", function () {
          document.querySelectorAll('code.language-mermaid').forEach(function (el) {
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = el.textContent;
            el.parentNode.replaceWith(div);
          });
          try {
            var runResult = window.mermaid.run();
            if (runResult && typeof runResult.then === 'function') {
              runResult.catch(function (error) {
                console.error('Mermaid failed to run:', error);
              });
            }
          } catch (error) {
            console.error('Mermaid failed to run:', error);
          }
        });
      }
    </script>

  </body>
</html>
